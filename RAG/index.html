<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG智能问答</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e6f7ff 0%, #b3e0ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 123, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chat-header i {
            font-size: 1.5rem;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f9fbfd;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border: 1px solid #e8f0fe;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .sources {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e8f0fe;
            font-size: 0.85rem;
        }

        .source-item {
            background: #f0f7ff;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 6px 0;
            border-left: 3px solid #1677ff;
        }

        .source-title {
            font-weight: 600;
            color: #1677ff;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .source-content {
            color: #666;
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;           
        }

        .confidence-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .confidence-high {
            background: #d9f7be;
            color: #52c41a;
        }

        .confidence-medium {
            background: #fff7e6;
            color: #fa8c16;
        }

        .confidence-low {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e8f0fe;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            background: #f9fbfd;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.1);
        }

        #message-input {
            flex: 1;
            border: none;
            padding: 14px 18px;
            font-size: 1rem;
            outline: none;
            resize: none;
            background: transparent;
            color: #333;
        }

        #message-input::placeholder {
            color: #999;
        }

        #message-input:focus {
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: white;
            border: none;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            border-radius: 16px;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #0958d9 0%, #003eb3 100%);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading-indicator {
            text-align: center;
            padding: 10px;
            color: #1677ff;
            font-size: 0.9rem;
        }

        .spinner {
            border: 2px solid rgba(22, 119, 255, 0.3);
            border-top: 2px solid #1677ff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .welcome-icon {
            font-size: 3.5rem;
            color: #1677ff;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .welcome-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1677ff;
            margin-bottom: 12px;
        }

        .welcome-text {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .status-bar {
            background: #f0f7ff;
            padding: 8px 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid #e8f0fe;
        }

        .status-connected {
            color: #52c41a;
        }

        .status-disconnected {
            color: #ff4d4f;
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #1677ff;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #0958d9;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .chat-container {
                height: 90vh;
                max-width: 100%;
                border-radius: 16px;
            }

            .message {
                max-width: 95%;
            }

            .chat-header {
                font-size: 1.1rem;
                padding: 15px;
            }

            .welcome-icon {
                font-size: 2.5rem;
            }

            .welcome-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <i class="fas fa-brain"></i>
            <span>RAG 智能问答系统</span>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <div class="welcome-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <h2 class="welcome-title">欢迎使用 RAG 智能问答</h2>
                <p class="welcome-text">
                    这是一个基于 LangChain 和 LangGraph 的智能问答系统。<br>
                    请直接输入您的问题，系统将基于知识库为您提供准确答案。
                </p>
                <p class="welcome-text" style="font-size: 0.85rem; color: #999;">
                    后端地址: <code>http://localhost:8002</code>
                </p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input">
                <textarea id="message-input"
                          placeholder="请输入您的问题... "
                          rows="1"></textarea>
                <button class="send-btn" id="send-message" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="loading-indicator" id="loading-indicator" style="display: none;">
                <div class="spinner"></div>
                <div>AI 正在思考中...</div>
            </div>
        </div>

        <div class="status-bar">
            <span id="api-status">API状态: <span class="status-disconnected">未连接</span></span>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_BASE_URL = 'http://localhost:8002';
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendMessageBtn = document.getElementById('send-message');
        const loadingIndicator = document.getElementById('loading-indicator');
        const apiStatusEl = document.getElementById('api-status');

        let isLoading = false;

        // ==================== 工具函数 ====================

        function showLoading() {
            isLoading = true;
            loadingIndicator.style.display = 'block';
            sendMessageBtn.disabled = true;
            messageInput.disabled = true;
        }

        function hideLoading() {
            isLoading = false;
            loadingIndicator.style.display = 'none';
            sendMessageBtn.disabled = false;
            messageInput.disabled = false;
        }

        function addMessage(content, isUser = false, sources = [], confidence = 0) {
            // 移除欢迎消息（如果是第一条消息）
            if (chatMessages.children.length === 1 &&
                chatMessages.firstElementChild.classList.contains('welcome-message')) {
                chatMessages.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;

            if (!isUser) {
                // AI 消息
                messageDiv.innerHTML = `
                    <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
                    ${sources.length > 0 || confidence > 0 ? `
                        <div class="sources">
                            ${confidence > 0 ? `
                                <span class="confidence-badge ${getConfidenceClass(confidence)}">
                                    置信度: ${(confidence * 100).toFixed(0)}%
                                </span>
                            ` : ''}
                            ${sources.map((source, index) => `
                                <div class="source-item">
                                    <div class="source-title">来源 [${index + 1}] ${source.source || 'unknown'}</div>
                                    <div class="source-content">${source.content_preview || source.text || ''}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                `;
            } else {
                // 用户消息
                messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getConfidenceClass(confidence) {
            if (confidence >= 0.8) return 'confidence-high';
            if (confidence >= 0.6) return 'confidence-medium';
            return 'confidence-low';
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message ai-message';
            errorDiv.innerHTML = `<div class="message-content" style="color: #ff4d4f;">❌ ${message}</div>`;
            chatMessages.appendChild(errorDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ==================== API 调用 ====================

        async function checkApiConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    apiStatusEl.innerHTML = 'API状态: <span class="status-connected">已连接</span>';
                    return true;
                }
            } catch (error) {
                apiStatusEl.innerHTML = 'API状态: <span class="status-disconnected">连接失败</span>';
                console.error('API 连接失败:', error);
                return false;
            }
        }

        async function sendQuery() {
            const question = messageInput.value.trim();
            if (!question || isLoading) return;

            // 添加用户消息
            addMessage(question, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            showLoading();

            try {
                const response = await fetch(`${API_BASE_URL}/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        use_history: true
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 添加 AI 响应
                addMessage(data.answer, false, data.sources, data.confidence);
            } catch (error) {
                showError(`查询失败: ${error.message}`);
                console.error('查询错误:', error);
            } finally {
                hideLoading();
            }
        }

        // ==================== 事件监听 ====================

        document.addEventListener('DOMContentLoaded', async function() {
            // 检查 API 连接
            await checkApiConnection();

            // 发送消息
            sendMessageBtn.addEventListener('click', sendQuery);

            // 回车发送（Shift+Enter 换行）
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!e.ctrlKey) {
                        sendQuery();
                    }
                }
            });

            // 自动调整文本框高度
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                sendMessageBtn.disabled = this.value.trim() === '';
            });

            // 初次聚焦
            setTimeout(() => {
                messageInput.focus();
            }, 300);
        });
    </script>
</body>
</html>
